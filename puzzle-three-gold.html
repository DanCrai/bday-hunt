<!DOCTYPE html>
<html>
<body>

    <div id="lock">
        <input type="password" id="pw">
        <button onclick="unlock()">Enter</button>
    </div>

    <div id="content" style="display:none;">
        <img id="img" src="zoom1.jpg">
        <p id="debug" style="font-size:12px;color:gray;"></p>
    </div>

    <script>
        const PASSWORD = "birthday";

        //  SET YOUR START TIME HERE
        let startTime = new Date("2026-05-01T15:00:00").getTime();

        //  IMAGE LIST (must match filenames EXACTLY)
        const images = ["zoom1.jpg", "zoom2.jpg", "zoom3.jpg"];

        let intervalStarted = false;

        function unlock() {
            const pwInput = document.getElementById("pw").value;

            if (pwInput === PASSWORD) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("content").style.display = "block";

                startTime = Date.now();

                updateImage();

                // prevent multiple intervals if button is clicked again
                if (!intervalStarted) {
                    setInterval(updateImage, 5000); // check every 5 sec
                    intervalStarted = true;
                }
            }
        }

        function updateImage() {
            const now = Date.now();

            // prevent negative values before startTime
            const step = Math.max(0, Math.floor((now - startTime) / 30000)); // 5 min steps
            const index = Math.min(step, images.length - 1);

            const imgElement = document.getElementById("img");
            const debug = document.getElementById("debug");

            const selectedImage = images[index];

            // set image
            imgElement.src = selectedImage;

            // debug info (remove later if you want)
            debug.innerText =
                "Now: " + new Date(now).toLocaleTimeString() +
                " | Step: " + step +
                " | Index: " + index +
                " | Image: " + selectedImage;
        }
    </script>

</body>
</html>
