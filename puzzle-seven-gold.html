<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            margin-top: 80px;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            text-align: center;
        }

        #mainContent {
            margin-top: 90px;
            padding: 15px;
        }

        .card {
            background: #1b1b1b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input, button {
            width: 50%;
            max-width: 500px;
            padding: 10px;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            border: none;
            background: #3a86ff;
            color: white;
        }

        #status {
            margin-top: 10px;
        }

        /* Park icon */
        #parkContainer {
            position: fixed;
            top: 10px;
            left: 10px;
        }

        /* Pulsing circle */
        #pulse {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 30px auto;
            background: blue;
            transform: scale(1);
            transition: background 0.3s;
        }
    </style>
</head>

<body>

    <div id="mainContent">

        <div id="lock" class="card">
            <input type="password" id="pw" placeholder="Access key">
            <button onclick="unlock()">Enter</button>
        </div>

        <div id="content" class="card" style="display:none;">
            <div id="parkContainer">
                <img src="tineretului.png">
            </div>
            <p>
                Îmi încep mesajele cu o vorbă ca să meargă treaba strună: <br />
                Morcovul tânăr și găina bătrână fac din ciorbă una bună.
            </p>
            <p>
                Semnalul vă poate ghida luând urma mirosului de moldovean borât.
            </p>
            <p id="status">Tap start</p>
            <button onclick="start()">Start Scanner</button>

            <div id="pulse"></div>
        </div>

    </div>

    <script>
        const PASSWORD = "bdayDCGold";

        // TARGET
        const targetLat = 44.404455;
        const targetLon = 26.108685;

        let ctx;
        let beepInterval = null;
        let currentInterval = 1000;

        // create ONE audio context
        function initAudio() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // stable beep
        function playBeep(volume) {
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();

            oscillator.type = "sine";
            oscillator.frequency.value = 800;

            gain.gain.value = volume;

            oscillator.connect(gain);
            gain.connect(ctx.destination);

            oscillator.start();
            oscillator.stop(ctx.currentTime + 0.1);
        }

        // distance → tier system
        function getTier(distance) {
            if (distance > 1000) return { interval: 2000, volume: 0.02, color: "#0a1aff", size: 1 };
            if (distance > 500) return { interval: 1500, volume: 0.04, color: "#1e90ff", size: 1.2 };
            if (distance > 200) return { interval: 900, volume: 0.07, color: "#00bfff", size: 1.5 };
            if (distance > 100) return { interval: 500, volume: 0.1, color: "#7fff00", size: 1.8 };
            if (distance > 50) return { interval: 300, volume: 0.15, color: "#ffd700", size: 2.2 };
            if (distance > 20) return { interval: 200, volume: 0.2, color: "#ff8c00", size: 2.5 };
            return { interval: 120, volume: 0.3, color: "#ff0000", size: 3 };
        }

        function updateFeedback(distance) {
            const tier = getTier(distance);
            const pulse = document.getElementById("pulse");

            // update color
            pulse.style.background = tier.color;

            // pulse animation
            pulse.animate([
                { transform: "scale(1)" },
                { transform: "scale(" + tier.size + ")" },
                { transform: "scale(1)" }
            ], {
                duration: tier.interval,
                iterations: 1
            });

            // update beep interval
            if (Math.abs(tier.interval - currentInterval) > 50) {
                currentInterval = tier.interval;

                if (beepInterval) clearInterval(beepInterval);

                beepInterval = setInterval(() => {
                    playBeep(tier.volume);
                }, tier.interval);
            }
        }

        function unlock() {
            if (document.getElementById("pw").value === PASSWORD) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("content").style.display = "block";
            }
        }

        function start() {
            initAudio();
            ctx.resume();

            navigator.geolocation.watchPosition(pos => {
                const d = getDistance(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    targetLat,
                    targetLon
                );

                document.getElementById("status").innerText =
                    "Distance: " + Math.round(d) + "m";

                updateFeedback(d);

                if (d < 10) {
                    document.getElementById("status").innerText = "Căutați la baza scărilor divergente ce urcă.";
                    if (beepInterval) clearInterval(beepInterval);
                }

            }, err => {
                document.getElementById("status").innerText = "Error: " + err.message;
            }, {
                enableHighAccuracy: true
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;

            return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>

</body>
</html>
