<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            margin-top: 80px;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            text-align: center;
        }

        #mainContent {
            margin-top: 90px;
            padding: 15px;
        }

        .card {
            background: #1b1b1b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input, button {
            width: 50%;
            max-width: 500px;
            padding: 10px;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            border: none;
            background: #3a86ff;
            color: white;
        }

        #status {
            margin-top: 10px;
        }

        /* Park icon */
        #parkContainer {
            position: fixed;
            top: 10px;
            left: 10px;
        }

        /* Pulsing circle */
        #pulse {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 30px auto;
            background: blue;
            transform: scale(1);
            transition: background 0.3s;
        }
    </style>
</head>

<body>

    <div id="mainContent">

        <div id="lock" class="card">
            <input type="password" id="pw" placeholder="Access key">
            <button onclick="unlock()">Enter</button>
        </div>

        <div id="content" class="card" style="display:none;">
            <div id="parkContainer">
                <img src="tineretului.png">
            </div>
            <p>
                Îmi încep mesajele cu o vorbă ca să meargă treaba strună: <br />
                Morcovul tânăr și găina bătrână fac din ciorbă una bună.
            </p>
            <p>
                Parola pentru următorul: XVczV
            </p>
            <p>
                Semnalul vă poate ghida luând urmna mirosului de moldovean borât.
            </p>
            <p id="status">Tap start</p>
            <button onclick="start()">Start Scanner</button>

            <div id="pulse"></div>
        </div>

    </div>

    <script>
        const PASSWORD = "raujl";

        // TARGET
        const targetLat = 44.404586;
        const targetLon = 26.108273;

        let ctx;
        let loopRunning = false;
        let currentTier = null;

        // init audio once
        function initAudio() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // play beep
        function playBeep(volume) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = "sine";
            osc.frequency.value = 800;

            gain.gain.value = volume;

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // YOUR EXACT TIERS
        function getTier(d) {

            // >1km
            if (d > 1000) return { interval: 11000, volume: 0.1, color: "#111111", scale: 1 };

            // every 100m = -1 second
            if (d > 900) return { interval: 10000, volume: 0.03, color: "#00008B", scale: 1.25 };
            if (d > 800) return { interval: 9000, volume: 0.035, color: "#0000CD", scale: 1.5 };
            if (d > 700) return { interval: 8000, volume: 0.04, color: "#4169E1", scale: 1.75 };
            if (d > 600) return { interval: 7000, volume: 0.05, color: "#6495ED", scale: 2 };
            if (d > 500) return { interval: 6000, volume: 0.06, color: "#87CEFA", scale: 2.25 };

            // 50m steps
            if (d > 450) return { interval: 5000, volume: 0.07, color: "#006400", scale: 2.5 };
            if (d > 400) return { interval: 4500, volume: 0.08, color: "#228B22", scale: 2.75 };
            if (d > 350) return { interval: 4000, volume: 0.09, color: "#32CD32", scale: 3 };
            if (d > 300) return { interval: 3500, volume: 0.1, color: "#7CFC00", scale: 3.25 };
            if (d > 250) return { interval: 3000, volume: 0.11, color: "#ADFF2F", scale: 3.5 };

            // 50m → faster drop
            if (d > 200) return { interval: 2500, volume: 0.13, color: "#8B0000", scale: 4 };
            if (d > 150) return { interval: 2000, volume: 0.15, color: "#FF0000", scale: 4.5 };
            if (d > 100) return { interval: 1500, volume: 0.17, color: "#FF6666", scale: 5 };

            // final zone (your exact spec)
            if (d > 75) return { interval: 1000, volume: 0.2, color: "#FFA500", scale: 5.5 };
            if (d > 50) return { interval: 750, volume: 0.22, color: "#CCCC00", scale: 6 };
            if (d > 25) return { interval: 500, volume: 0.25, color: "#FFFF00", scale: 6.5 };

            return { interval: 300, volume: 0.3, color: "#FFFFFF", scale: 7 };
        }

        // unified loop
        async function runLoop() {
            if (loopRunning) return;
            loopRunning = true;

            const pulse = document.getElementById("pulse");

            while (loopRunning) {
                const d = window.currentDistance || 9999;
                const tier = getTier(d);

                currentTier = tier;

                // apply color
                pulse.style.background = tier.color;

                // animate (grow then shrink)
                pulse.animate([
                    { transform: "scale(1)" },
                    { transform: "scale(" + tier.scale + ")" },
                    { transform: "scale(1)" }
                ], {
                    duration: tier.interval,
                    easing: "ease-out"
                });

                // play sound (skip if >1km)
                if (tier.volume > 0) {
                    playBeep(tier.volume);
                }

                await new Promise(r => setTimeout(r, tier.interval));
            }
        }

        function unlock() {
            if (document.getElementById("pw").value === PASSWORD) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("content").style.display = "block";
            }
        }

        function start() {
            initAudio();
            ctx.resume();

            runLoop();

            navigator.geolocation.watchPosition(pos => {
                const d = getDistance(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    targetLat,
                    targetLon
                );

                window.currentDistance = d;

                /*document.getElementById("status").innerText =
                    "Distance: " + Math.round(d) + "m";*/

                if (d < 15) {
                    document.getElementById("status").innerText =
                        "Căutați la baza scărilor divergente ce urcă.";
                    loopRunning = false;
                }

            }, err => {
                document.getElementById("status").innerText = "Error: " + err.message;
            }, {
                enableHighAccuracy: true
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;

            return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>

</body>
</html>
