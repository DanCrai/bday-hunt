<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            margin-top: 80px;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
        }

        /* Main container */
        #mainContent {
            margin-top: 90px;
            padding: 15px;
        }

        /* Card-style box */
        .card {
            background: #1b1b1b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input, button {
            width: 50%;
            max-width: 500px;
            padding: 10px;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            border: none;
            background: #3a86ff;
            color: white;
        }

        /* Status text */
        #status, #result {
            margin-top: 10px;
            font-size: 16px;
        }

        /* Park icon container */
        #parkContainer {
            position: fixed;
            top: 10px;
            left: 10px;
        }

            #parkContainer img {
                width: 60px;
            }

        /* Title */
        h3 {
            margin-top: 0;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="mainContent">
        <div id="lock" class="card">
            <input type="password" id="pw">
            <button onclick="check()">Enter</button>
        </div>


        <div id="content" class="card" style="display:none;">
            <div id="parkContainer">
                <img src="tineretului.png">
            </div>
            <p>
                Îmi încep mesajele cu o vorbă ca să meargă treaba strună: <br />
                Morcovul tânăr și găina bătrână fac din ciorbă una bună.
            </p>
            <p>
                Acum finalul vă așteaptă. Porniți spre unde ați început, dar trag speranță că nu ați ratat nimic pe drum, căci și fginalul își vrea zicala.
            </p>
        </div>
    </div>

    <script>
        const PASSWORD = "bdayDCGold";

        function check() {
            if (pw.value === PASSWORD) {
                lock.style.display = "none";
                content.style.display = "block";
            }
        }
    </script>

</body>
</html>
